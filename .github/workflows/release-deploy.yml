name: Release Deploy

on:
  release:
    types:
      - published

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger backend deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_BACKEND_DEPLOY_HOOK is not set"
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$DEPLOY_HOOK_URL"

      - name: Trigger frontend deploy
        env:
          DEPLOY_HOOK_URL: ${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "RENDER_FRONTEND_DEPLOY_HOOK is not set"
            exit 1
          fi
          curl --fail --silent --show-error --request POST "$DEPLOY_HOOK_URL"
